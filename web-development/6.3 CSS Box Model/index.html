<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Box Model</title>
  <style>
   /* 2. Set their sizes to 200px high by 200px wide. */
    div {
      height: 200px;
      width: 200px;
    }
    
    /* 3. Set different background colors for each of the boxes. */
    #One {
      background-color: darkcyan;
    /* 5. Set the 1st div to have 20px padding all around with a black 10px border. */
      padding: 20px;
      border: 10px solid black;
    }
    
    #Two {
      background-color: indigo;
      /* 7. Set the 2nd div to have a 20px border on top and bottom and 10px border left and right. */
      border: solid black;
      border-width: 20px 10px;
      /* 9. Set the margins for the divs so that each box corner touches the other. */
      margin-left: 260px;
    }
    
    #Three {
      background-color: salmon;
      /* 8. Set the 3rd div to have a 10px border */
      border: 10px solid black;
      /* 9. Set the margins for the divs so that each box corner touches the other. */
      margin-left: 40px;
    }

/* 6. Fix the style of the <p> element to remove all margins. */
    p {
      margin: 0
    }
    </style>
</head>

<!--1. Create 3 Boxes using the div element.-->
<body>
  <div id="One">
    <!-- 4. Add a paragraph <p> element into the first div and add the following words: -->
    <p>
    Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam at sapien porttitor urna 
    elementum lacinia. In id magna pulvinar, ultricies lorem id, vehicula elit. Aliquam eu luctus 
    nisl, vitae pellentesque magna. Phasellus dolor metus, laoreet ac convallis sit amet, efficitur 
    sed dolor.
    </p>

  </div>
  <div id="Two"></div>
  <div id="Three"></div>
  <!-- TODOs:
-->

</body>

</html>
